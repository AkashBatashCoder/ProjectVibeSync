{% extends 'base.html' %}

{% block title %}404 - Not Found{% endblock %}

{% block header %}
  <h1>Page Not Found</h1>
{% endblock %}

{% block content %}
  <div style="text-align: center; padding: 4rem 1rem;">
    <h2 style="font-size: 6rem; margin: 0; opacity: 0.15;">404</h2>
    <p>The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('blog.index') }}" class="action" style="display:inline-block; margin-top:1.5rem;">
      Go Home
    </a>
  </div>
{% endblock %}
